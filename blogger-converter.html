<script>
//<![CDATA[
var TOOL_INFO = Object.freeze({
  id:"healingmart-converter",
  name:"힐링편의점 변환도구",
  brand:"Healing Mart",
  author:"Healing Mart",
  version:"3.7.0",
  website:"https://www.healing-mart.com/",
  qna:"https://www.healing-mart.com/p/qna.html",
  assetBase:"https://healingmart.github.io/healingmart-converter"
});

(function(){
  "use strict";

  var ALLOWED_HOSTS = Object.freeze([
    "www.healing-mart.com",
    "healing-mart.com",
    "healingmart.blogspot.com"
  ]);

  var host = String(window.location.hostname || "").toLowerCase();
  var root = document.getElementById("healingMartConverterApp");
  var stage = root ? root.querySelector("[data-hm-converter-stage]") : null;

  function showError(title,text){
    if(!stage){return;}
    stage.setAttribute("aria-busy","false");
    stage.innerHTML = '<div class="hm-converter-load-error"><strong>' + title + '</strong><span>' + text + '</span></div>';
  }

  if(ALLOWED_HOSTS.indexOf(host) === -1){
    showError("이 페이지에서는 실행할 수 없습니다.","힐링편의점 공식 사이트에서 이용해 주세요.");
    return;
  }

  var appScript = document.createElement("script");
  appScript.src = TOOL_INFO.assetBase + "/dist/js/hm-converter-app.v3.7.0.js?v=3.7.0";
  appScript.defer = true;
  appScript.setAttribute("data-base",TOOL_INFO.assetBase);
  appScript.referrerPolicy = "strict-origin-when-cross-origin";

  appScript.onload = function(){
    if(stage){stage.setAttribute("aria-busy","false");}
  };
  appScript.onerror = function(){
    showError("변환도구를 불러오지 못했습니다.","잠시 후 다시 시도해 주세요. 문제가 계속되면 오류·문의 페이지로 알려주세요.");
  };
  document.body.appendChild(appScript);

  function homeUrl(){
    var u = new URL(window.location.href);
    u.searchParams.delete("category");
    u.searchParams.delete("convert");
    return u.pathname + u.search + u.hash;
  }

  function isConverterHome(){
    var u = new URL(window.location.href);
    return !u.searchParams.get("category") && !u.searchParams.get("convert");
  }

  function firePopState(){
    try{window.dispatchEvent(new PopStateEvent("popstate"));}
    catch(e){window.dispatchEvent(new Event("popstate"));}
  }

  function goHome(callback){
    if(isConverterHome()){
      callback();
      return;
    }
    history.pushState({},"",homeUrl());
    firePopState();
    window.setTimeout(callback,140);
  }

  function scrollToElement(selector){
    var el = document.querySelector(selector);
    if(el){el.scrollIntoView({behavior:"smooth",block:"start"});}
  }

  document.addEventListener("click",function(event){
    var btn = event.target.closest("[data-hm-converter-nav]");
    if(!btn){return;}

    var action = btn.getAttribute("data-hm-converter-nav");

    if(action === "home"){
      goHome(function(){window.scrollTo({top:0,behavior:"smooth"});});
      return;
    }

    if(action === "quick"){
      goHome(function(){
        var details = document.querySelector("[data-quickfinder]");
        if(details){details.open = true;}
        scrollToElement("#hmFxQuickFinderSection");
      });
      return;
    }

    if(action === "upload"){
      if(isConverterHome()){
        var fileInput = document.querySelector("[data-home-file]");
        if(fileInput){fileInput.click();return;}
      }
      goHome(function(){scrollToElement("#hmFxUploadSection");});
      return;
    }

    if(action === "categories"){
      goHome(function(){scrollToElement("#hmFxCategoriesSection");});
    }
  });
})();
//]]>
</script>
