//<![CDATA[
(function(){
  "use strict";

  var root = document.getElementById("healingMartConverterApp");
  var stage = root ? root.querySelector("[data-hm-converter-stage]") : null;

  function current(){
    var u = new URL(window.location.href);
    return {
      category:u.searchParams.get("category"),
      convert:u.searchParams.get("convert")
    };
  }

  function isHome(){
    var r = current();
    return !r.category && !r.convert;
  }

  function homeUrl(){
    var u = new URL(window.location.href);
    u.searchParams.delete("category");
    u.searchParams.delete("convert");
    u.hash = "";
    return u.pathname + u.search;
  }

  function firePopState(){
    try{window.dispatchEvent(new PopStateEvent("popstate"));}
    catch(e){window.dispatchEvent(new Event("popstate"));}
  }

  function fixedTopOffset(){
    var nodes = document.querySelectorAll(
      "header,#header,.header,.header-wrapper,.header-outer,.site-header,.main-header,.navbar,.top-bar"
    );
    var maxBottom = 0;

    for(var i=0;i<nodes.length;i++){
      var style = window.getComputedStyle(nodes[i]);
      var rect = nodes[i].getBoundingClientRect();

      if(
        (style.position === "fixed" || style.position === "sticky") &&
        rect.height > 0 &&
        rect.height < 180 &&
        rect.top <= 4 &&
        rect.bottom > 0
      ){
        maxBottom = Math.max(maxBottom,rect.bottom);
      }
    }

    return Math.max(0,Math.round(maxBottom));
  }

  function jumpTo(el){
    if(!el){return;}
    var top = Math.max(
      0,
      Math.round(
        window.pageYOffset +
        el.getBoundingClientRect().top -
        fixedTopOffset() -
        2
      )
    );
    window.scrollTo({top:top,left:0,behavior:"auto"});
  }

  function goHome(callback){
    if(isHome()){
      callback();
      return;
    }

    history.pushState({},"",homeUrl());
    firePopState();
    window.setTimeout(callback,80);
  }


  var bottomNav = document.querySelector(".hm-converter-bottom-nav");
  var bottomBoundary = document.querySelector("[data-hm-converter-bottom-boundary]");
  var bottomNavFrame = 0;

  function setBottomNavVisible(visible){
    if(!bottomNav){return;}
    bottomNav.classList.toggle("hm-bottom-nav-outside",!visible);
    bottomNav.setAttribute("aria-hidden",visible ? "false" : "true");
  }

  function updateBottomNavVisibility(){
    bottomNavFrame = 0;
    if(!root || !bottomNav || !bottomBoundary){
      setBottomNavVisible(false);
      return;
    }

    var appRect = root.getBoundingClientRect();
    var boundaryRect = bottomBoundary.getBoundingClientRect();
    var viewportHeight =
      window.innerHeight ||
      document.documentElement.clientHeight ||
      0;

    var navHeight = Math.max(
      bottomNav.getBoundingClientRect().height || 0,
      58
    );

    var bottomGap = window.matchMedia &&
      window.matchMedia("(max-width:760px)").matches ? 8 : 12;

    /*
     * 바텀 메뉴가 실제로 놓이는 화면상의 윗선.
     * 이 선이 변환기 앱의 시작과 끝 사이에 있을 때만 메뉴를 표시한다.
     */
    var navTopLine = viewportHeight - navHeight - bottomGap;

    var appHasReachedNav =
      appRect.top < navTopLine;

    var appHasNotPassedNav =
      boundaryRect.top > navTopLine;

    setBottomNavVisible(appHasReachedNav && appHasNotPassedNav);
  }

  function requestBottomNavUpdate(){
    if(bottomNavFrame){return;}
    bottomNavFrame = window.requestAnimationFrame(
      updateBottomNavVisibility
    );
  }

  if(root && bottomNav && bottomBoundary){
    window.addEventListener(
      "scroll",
      requestBottomNavUpdate,
      {passive:true}
    );
    window.addEventListener(
      "resize",
      requestBottomNavUpdate
    );
    window.addEventListener(
      "orientationchange",
      requestBottomNavUpdate
    );

    if("ResizeObserver" in window){
      var bottomNavResizeObserver =
        new ResizeObserver(requestBottomNavUpdate);
      bottomNavResizeObserver.observe(root);
      bottomNavResizeObserver.observe(bottomNav);
    }

    if(stage && "MutationObserver" in window){
      var bottomNavMutationObserver =
        new MutationObserver(requestBottomNavUpdate);
      bottomNavMutationObserver.observe(
        stage,
        {childList:true,subtree:true}
      );
    }

    requestBottomNavUpdate();
    window.setTimeout(requestBottomNavUpdate,120);
  }else{
    setBottomNavVisible(false);
  }

  document.addEventListener("click",function(event){
    var btn = event.target.closest("[data-hm-converter-nav]");
    if(!btn){return;}

    var action = btn.getAttribute("data-hm-converter-nav");

    if(action === "home"){
      goHome(function(){jumpTo(stage || root);});
      return;
    }

    if(action === "quick"){
      goHome(function(){
        var sheet = document.querySelector("[data-quick-sheet]");
        var details = document.querySelector("[data-quickfinder]");
        if(sheet){sheet.hidden = false;}
        if(details){details.open = true;}
      });
      return;
    }

    if(action === "upload"){
      if(isHome()){
        var file = document.querySelector("[data-home-file]");
        if(file){file.click();return;}
      }

      goHome(function(){
        jumpTo(document.getElementById("hmFxUploadSection"));
      });
      return;
    }

    if(action === "categories"){
      goHome(function(){
        jumpTo(document.getElementById("hmFxCategoriesSection"));
      });
    }
  });
})();
//]]>
</script>
